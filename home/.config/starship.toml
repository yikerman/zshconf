"$schema" = 'https://starship.rs/config-schema.json'

# Added a space between hostname and directory for better readability
format = """
$username\
$hostname \
$directory
$character"""

# Everything not placed in `format` shows up on the right side of line 1.
right_format = """$all"""

add_newline = true

[username]
show_always = true
format = '[$user]($style)'
style_user = 'bold bright-blue' # Changed to blue to separate from hostname
style_root = 'bold bright-red'

[hostname]
ssh_only = false
# Styles the '@' and ':' as dimmed, making the hostname itself pop
format = '[@](dimmed white)[$hostname]($style)[:](dimmed white)'
style = 'bold bright-magenta'   # Changed to magenta for high contrast
trim_at = '.'

[directory]
format = '[$path]($style)[$read_only]($read_only_style)'
style = 'bold bright-cyan'      # Cyan provides great contrast against blue/magenta
truncation_length = 0
truncate_to_repo = false
read_only = ' 🔒'
read_only_style = ''

[character]
success_symbol = '[>](bold green)'
error_symbol   = '[>](bold red)'
