"$schema" = 'https://starship.rs/config-schema.json'

format = """
$username\
$hostname\
$directory
$character"""

# Everything not placed in `format` shows up on the right side of line 1.
right_format = """$all"""

add_newline = true

[username]
show_always = true
format = '[$user]($style)'
style_user = 'bold green'
style_root = 'bold red'

[hostname]
ssh_only = false          # always show hostname, not just over SSH
format = '[@$hostname]($style):'
style = 'bold green'
trim_at = '.'             # drop anything after the first dot in the FQDN

[directory]
format = '[$path]($style)'
style = 'bold blue'
truncation_length = 0
truncate_to_repo = false

[character]
success_symbol = '[>](bold green)'
error_symbol   = '[>](bold red)'
